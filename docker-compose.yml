version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: interviewiq-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: interviewiq

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: interviewiq-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/interviewiq
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: interviewiq-client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
